<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" fill="none">
  <defs>
    <filter id="neon-green" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <!-- Dupla Hélice de DNA Geométrica -->
  <g stroke-width="2" stroke-linecap="round" filter="url(#neon-green)">
    <!-- Hélice 1 (Verde Esmeralda) -->
    <path d="M 6 10 C 12 10, 20 22, 26 22" stroke="#10B981" />
    <!-- Hélice 2 (Roxo) -->
    <path d="M 6 22 C 12 22, 20 10, 26 10" stroke="#8B5CF6" />
    
    <!-- Pontes de Conexão -->
    <line x1="11" y1="13" x2="11" y2="19" stroke="#E2E8F0" stroke-width="1.2" opacity="0.6" />
    <line x1="16" y1="16" x2="16" y2="16" stroke="#E2E8F0" stroke-width="1.2" opacity="0.6" />
    <line x1="21" y1="19" x2="21" y2="13" stroke="#E2E8F0" stroke-width="1.2" opacity="0.6" />
  </g>
  <!-- Nós das extremidades -->
  <circle cx="6" cy="10" r="1.5" fill="#10B981" />
  <circle cx="26" cy="22" r="1.5" fill="#10B981" />
  <circle cx="6" cy="22" r="1.5" fill="#8B5CF6" />
  <circle cx="26" cy="10" r="1.5" fill="#8B5CF6" />
</svg>

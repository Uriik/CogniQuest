<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" fill="none">
  <defs>
    <!-- Filtro de Brilho Neon Ciano -->
    <filter id="neon-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.5" result="blur1" />
      <feGaussianBlur stdDeviation="7" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Gradiente Ciano a Roxo para Detalhes -->
    <linearGradient id="cyber-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F0FF" />
      <stop offset="100%" stop-color="#8B5CF6" />
    </linearGradient>
  </defs>

  <!-- Estrutura Tridimensional Isométrica do Cubo formando um 'C' -->
  <g stroke="url(#cyber-grad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#neon-glow)">
    
    <!-- Linhas Externas do Hexágono (Cubo) -->
    <!-- Topo -->
    <path d="M 50 15 L 80 32 M 50 15 L 20 32" />
    <!-- Esquerda -->
    <path d="M 20 32 L 20 68 L 50 85" stroke-width="3" /> <!-- Borda esquerda reforçada para o 'C' -->
    <!-- Direita (Mais fina / aberta para formar a abertura do 'C') -->
    <path d="M 80 32 L 80 45" opacity="0.4" stroke-width="1.5" />
    <path d="M 80 55 L 80 68 L 50 85" opacity="0.75" />

    <!-- Linhas Internas (Arestas de Projeção do Cubo) -->
    <!-- Eixo Central -->
    <path d="M 50 15 L 50 50 L 20 68" stroke-width="3" /> <!-- Formando o canto interno do 'C' -->
    <path d="M 50 50 L 80 68" opacity="0.5" />

    <!-- Detalhes de Conexão em Nós (Pontos Brilhantes) -->
    <circle cx="50" cy="15" r="2" fill="#FFFFFF" stroke="none" />
    <circle cx="20" cy="32" r="2" fill="#FFFFFF" stroke="none" />
    <circle cx="20" cy="68" r="2" fill="#FFFFFF" stroke="none" />
    <circle cx="50" cy="85" r="2" fill="#FFFFFF" stroke="none" />
    <circle cx="50" cy="50" r="2" fill="#FFFFFF" stroke="none" />
    <circle cx="80" cy="32" r="1.5" fill="#00F0FF" stroke="none" />
    <circle cx="80" cy="68" r="1.5" fill="#00F0FF" stroke="none" />
  </g>
</svg>

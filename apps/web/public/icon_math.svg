<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" fill="none">
  <defs>
    <filter id="neon-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <!-- Símbolos de Matemática Estilizados (Mais e Menos) -->
  <g stroke="#00F0FF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#neon-cyan)">
    <!-- Linha Horizontal do Mais -->
    <path d="M 6 13 L 20 13" />
    <!-- Linha Vertical do Mais -->
    <path d="M 13 6 L 13 20" />
    <!-- Linha de Divisão/Subtração em Degradê Roxo abaixo -->
    <path d="M 6 25 L 26 25" stroke="#8B5CF6" stroke-width="2" />
    <circle cx="16" cy="21" r="1.5" fill="#8B5CF6" stroke="none" />
    <circle cx="16" cy="29" r="1.5" fill="#8B5CF6" stroke="none" />
  </g>
</svg>

    <path d="M 16 26 C 12 22 7 22 4 22 L 4 10 C 7 10 12 10 16 14 C 20 10 25 10 28 10 L 28 22 C 25 22 20 22 16 26 Z" />
    <path d="M 16 14 L 16 26" stroke-width="1.5" />
  </g>
  <!-- Pena / Caneta Escrevendo em Roxo e Brilho Branco -->
  <g stroke="#8B5CF6" stroke-width="2" stroke-linecap="round" filter="url(#neon-cyan)">
    <!-- Pena diagonal descendo da direita para a esquerda -->
    <path d="M 25 6 L 18 16" />
    <path d="M 18 16 L 17 20 L 21 19 L 25 6" fill="none" stroke-width="1.5" />
  </g>
  <circle cx="16" cy="7" r="1" fill="#00F0FF" />
</svg>

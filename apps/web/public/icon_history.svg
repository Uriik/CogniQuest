<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" fill="none">
  <defs>
    <filter id="neon-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <!-- Ampulheta em Ciano -->
  <g stroke="#00F0FF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" filter="url(#neon-cyan)">
    <!-- Base Topo e Base Fundo -->
    <path d="M 6 6 L 26 6" />
    <path d="M 6 26 L 26 26" />
    <!-- Vidro Curvado da Ampulheta -->
    <path d="M 8 6 C 8 13 14 15 14 16 C 14 17 8 19 8 26" />
    <path d="M 24 6 C 24 13 18 15 18 16 C 18 17 24 19 24 26" />
  </g>
  <!-- Areia escorrendo em Roxo e Branco -->
  <g stroke="#8B5CF6" stroke-width="1.5" stroke-linecap="round">
    <!-- Areia acumulada no topo -->
    <path d="M 11 9 C 13 13 19 13 21 9 Z" fill="#8B5CF6" stroke="none" />
    <!-- Areia escorrendo (linha vertical central) -->
    <path d="M 16 13 L 16 22" stroke="#FFFFFF" stroke-width="1" filter="url(#neon-cyan)" />
    <!-- Areia acumulada no fundo -->
    <path d="M 9 25 C 12 21 20 21 23 25 Z" fill="#8B5CF6" stroke="none" />
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" fill="none">
  <defs>
    <filter id="neon-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <!-- Núcleo Atômico -->
  <circle cx="16" cy="16" r="3" fill="#FFFFFF" filter="url(#neon-cyan)" />
  
  <!-- Órbitas Elípticas em Ciano e Roxo -->
  <g stroke-width="1.5" filter="url(#neon-cyan)">
    <!-- Órbita 1 (Ciano) -->
    <ellipse cx="16" cy="16" rx="12" ry="4" stroke="#00F0FF" transform="rotate(-30 16 16)" />
    <!-- Órbita 2 (Roxo) -->
    <ellipse cx="16" cy="16" rx="12" ry="4" stroke="#8B5CF6" transform="rotate(30 16 16)" />
  </g>
  
  <!-- Elétrons (Pontos de Luz) -->
  <circle cx="6" cy="10" r="1.5" fill="#00F0FF" />
  <circle cx="26" cy="10" r="1.5" fill="#8B5CF6" />
</svg>

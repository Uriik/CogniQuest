<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" fill="none">
  <defs>
    <filter id="neon-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <!-- Globo / Círculo Principal em Ciano -->
  <g stroke="#00F0FF" stroke-width="2" filter="url(#neon-cyan)">
    <!-- Círculo do Globo -->
    <circle cx="16" cy="16" r="11" />
  </g>
  <!-- Linhas de Longitude e Latitude -->
  <g stroke="#00F0FF" stroke-width="1.2" filter="url(#neon-cyan)" opacity="0.8">
    <!-- Linha do Equador -->
    <path d="M 5 16 L 27 16" />
    <!-- Meridiano de Greenwich (Linha Central Vertical) -->
    <path d="M 16 5 L 16 27" />
    <!-- Linha Curva de Longitude Esquerda e Direita -->
    <path d="M 16 5 C 10 10 10 22 16 27" />
    <path d="M 16 5 C 22 10 22 22 16 27" />
  </g>
  <!-- Pino Localizador (Pin de Mapa) em Roxo e Ponto Branco no Centro -->
  <g filter="url(#neon-cyan)">
    <!-- Pin do Mapa posicionado acima e à direita -->
    <path d="M 21 8 C 19.5 8 18.5 9.5 18.5 11 C 18.5 13 21 16 21 16 C 21 16 23.5 13 23.5 11 C 23.5 9.5 22.5 8 21 8 Z" fill="#8B5CF6" stroke="none" />
    <circle cx="21" cy="11" r="1.2" fill="#FFFFFF" />
  </g>
</svg>

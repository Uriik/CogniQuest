<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80" fill="none">
  <defs>
    <!-- Filtro de Brilho Neon Ciano -->
    <filter id="neon-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="blur1" />
      <feGaussianBlur stdDeviation="5" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Gradiente Ciano a Roxo para o Ícone -->
    <linearGradient id="cyber-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F0FF" />
      <stop offset="100%" stop-color="#8B5CF6" />
    </linearGradient>

    <!-- Estilos de Fonte -->
    <style>
      .text-cogni {
        font-family: 'Outfit', 'Inter', 'Segoe UI', sans-serif;
        font-weight: 700;
        font-size: 30px;
        fill: #FFFFFF;
      }
      .text-quest {
        font-family: 'Outfit', 'Inter', 'Segoe UI', sans-serif;
        font-weight: 500;
        font-size: 30px;
        fill: #00F0FF;
      }
    </style>
  </defs>

  <!-- Grupo do Ícone (Deslocado para a esquerda, redimensionado para 56x56) -->
  <g transform="translate(15, 12)" stroke="url(#cyber-grad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" filter="url(#neon-glow)">
    <!-- Hexágono Externo -->
    <path d="M 28 8 L 48 20 L 48 40 M 28 8 L 8 20 L 8 40" />
    <path d="M 8 40 L 28 52" stroke-width="2.5" />
    <path d="M 48 40 L 28 52" opacity="0.8" />
    <!-- Interno -->
    <path d="M 28 8 L 28 30 L 8 40" stroke-width="2.5" />
    <path d="M 28 30 L 48 40" opacity="0.5" />
    <!-- Nós -->
    <circle cx="28" cy="8" r="1.5" fill="#FFFFFF" stroke="none" />
    <circle cx="8" cy="20" r="1.5" fill="#FFFFFF" stroke="none" />
    <circle cx="8" cy="40" r="1.5" fill="#FFFFFF" stroke="none" />
    <circle cx="28" cy="52" r="1.5" fill="#FFFFFF" stroke="none" />
    <circle cx="28" cy="30" r="1.5" fill="#FFFFFF" stroke="none" />
  </g>

  <!-- Grupo do Texto (Alinhado verticalmente) -->
  <text x="80" y="49" class="text-cogni">Cogni<tspan class="text-quest" filter="url(#neon-glow)">Quest</tspan></text>
</svg>
